<div class="container mt-4">
  <div *ngIf="message()" [ngClass]="isError() ? 'alert alert-danger' : 'alert alert-success'" class="alert text-center custom-alert">
    {{ message() }}
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title">Category Management</h2>
    <button class="btn btn-primary action-btn" (click)="toggleForm()">
      {{ showForm() ? 'Close Form' : 'Add New Category' }}
    </button>
  </div>

  <div *ngIf="showForm()" class="card mb-4 shadow-sm custom-card animate-fade">
    <div class="card-header bg-dark text-white">
      <h5 class="card-title mb-0">{{ isEditMode() ? 'Edit Category' : 'Create Category' }}</h5>
    </div>
    <div class="card-body">
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="categoryName" class="form-label fw-bold">Category Name</label>
          <input type="text" id="categoryName" name="categoryName" class="form-control text-input" 
                 [(ngModel)]="categoryName" 
                 placeholder="Enter category name" required>
        </div>
        <div class="mb-3">
          <label for="description" class="form-label fw-bold">Description</label>
          <textarea id="description" name="description" class="form-control text-input" rows="3"
                    [(ngModel)]="description" 
                    placeholder="Enter category description"></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success px-4">{{ isEditMode() ? 'Update' : 'Save' }}</button>
          <button type="button" class="btn btn-secondary px-4" (click)="resetForm()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm custom-card">
    <div class="card-header bg-secondary text-white">
      <h5 class="card-title mb-0">Category List</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle mb-0 custom-table">
        <thead class="table-dark">
          <tr>
            <th style="width: 10%">ID</th>
            <th style="width: 30%">Category Name</th>
            <th style="width: 40%">Description</th>
            <th style="width: 20%" class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of catagoriList()">
            <td>{{ item.id }}</td>
            <td><strong>{{ item.categoryName }}</strong></td>
            <td>{{ item.description }}</td>
            <td class="text-center">
              <div class="btn-group gap-2 justify-content-center">
                <button class="btn btn-sm btn-outline-warning row-btn" (click)="onEdit(item)">Edit</button>
                <button class="btn btn-sm btn-outline-danger row-btn" (click)="onDelete(item.id!)">Delete</button>
              </div>
            </td>
          </tr>
          <tr *ngIf="catagoriList().length === 0">
            <td colspan="4" class="text-center text-muted py-4 fallback-text">No categories found. Please add some!</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
