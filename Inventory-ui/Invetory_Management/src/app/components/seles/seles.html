<div class="container py-4">
  <div class="row g-4">

   
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm rounded-3">
        <div class="card-header bg-white border-0 pt-4 px-4 pb-0">
          <h5 class="fw-bold text-dark m-0">New Sale Entry</h5>
          <p class="text-muted small">Add sale details</p>
        </div>
        <div class="card-body p-4 bg-white">
          <form (ngSubmit)="onSubmit()">

            <!-- Customer Selection Dropdown -->
            <div class="mb-3">
              <label for="customer" class="form-label fw-semibold text-secondary small">Select Customer *</label>
              <select 
                id="customer" 
                class="form-select border-2 border-light-subtle rounded-3"
                [ngModel]="selectedCustomerId()" 
                (ngModelChange)="selectedCustomerId.set($event)"
                name="selectedCustomerId" 
                required>
                <option [ngValue]="null" disabled selected>-- Choose Customer --</option>
                <option *ngFor="let cust of customers()" [value]="cust.id">
                  {{ cust.customerName || 'Customer #' + cust.id }}
                </option>
              </select>
            </div>

            <!-- Total Amount -->
            <div class="mb-3">
              <label for="totalAmount" class="form-label fw-semibold text-secondary small">Total Amount (৳) *</label>
              <input 
                type="number" 
                id="totalAmount" 
                class="form-control border-2 border-light-subtle rounded-3"
                [ngModel]="totalAmount()" 
                (ngModelChange)="totalAmount.set($event)"
                name="totalAmount" 
                placeholder="e.g. 5000" 
                required 
                min="0">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-semibold mt-2">
              Save Sale Record
            </button>
          </form>
        </div>
      </div>
    </div>


    <div class="col-lg-8">
      <div class="card border-0 shadow-sm rounded-3">
        <div class="card-header bg-white border-0 pt-4 px-4 pb-0">
          <h5 class="fw-bold text-dark m-0">Sales Records</h5>
        </div>
        <div class="card-body p-4">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>#ID</th>
                  <th>Customer Info</th>
                  <th>Sale Date</th>
                  <th>Total Amount</th>
                  <th class="text-center">Action</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of salesList()">
                  <td>#{{ item.id }}</td>
                  <td>
                    <span class="fw-semibold text-dark">
                     {{ item.customer?.name || 'Customer #' + item.customer?.id }}
                    </span>
                  </td>
                  <td>{{ item.saleDate | date:'medium' }}</td>
                  <td class="fw-bold text-success">৳{{ item.totalAmount }}</td>
                  <td class="text-center">
                    <button class="btn btn-sm btn-outline-danger border-0" (click)="onDelete(item.id)">
                      Delete
                    </button>
                  </td>
                </tr>
                <tr *ngIf="salesList().length === 0">
                  <td colspan="5" class="text-center text-muted py-4">No sales records found.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
